<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/claseCuatro.css" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
   <div class="login">
    <div class="content">
        
        <h1 class="content__title">My account</h1>

        <form action="/" class="content__form">
            <label for="name" class="content__label">Name</label>
            <input type="password" id="name" placeholder="ur name" class="content__input">

            <label for="email" class="content__label">E-mail</label>
            <input type="text" id="email" placeholder="alumno@ipn.om" class="content__input">

            <label for="password" class="content__label">Password</label>
            <input type="password" id="password" placeholder="********" class="content__input">

            <label for="re-enter-password" class="content__label">Re-enter password</label>
            <input type="password" id="re-enter-password" placeholder="********" class="content__input">

            <input type="submit" value="Create account" class="content__button content__button--primary">
        </form>
    </div>
</div>
</body>
</html>
