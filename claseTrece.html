<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/claseTrece.css" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <aside class="product-detail">
        <div class="my-orders">
            <div class="my-orders__container-title">
                <img src="./Platzi_YardSale_Icons/flechita.svg" alt="arrow" class="my-orders__arrow">
                <p class="my-orders__title">
                My order
            </p>
            </div>
            
            <div class="my-orders__content">

                <div class="cart">
                    <figure>
                        <img src="https://images.pexels.com/photos/100582/pexels-photo-100582.jpeg" alt=""

                    </figure>
                    <p>Bike</p>
                    <p>$40,00</p>

            </div>
            <div class="my-orders__content__background">
                <p>
                    <span>Total</span>
                </p>
                <p>
                    <span>$560,00</span>
                </p>
            </div>
        </div>
        <button class="content__button--primary">
            
            checkout
