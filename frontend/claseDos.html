<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/claseDos.css" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<body>
    <div class="login">
    <div class="content">
        <img src="./Platzi_YardSale_Logos/logo_yard_sale.svg" alt="Yard Sale Logo" class="content__logo">
        <h1 class="content__title">Email has been sent</h1>
        <p class="content__subtitle">Please check your inbox for instruction on how to reset your password</p>
        <div class="content__mail">
            <img src="./Platzi_YardSale_Icons/email.svg" alt="Yard Sale mail" class="content__mail-logo">

        <button class="content__button content__button--primary">Login</button>
        <p class="content__resend">

            <a href="" class="content__a">Resend</a>
        </p>
    </div>
</div>
