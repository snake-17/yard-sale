<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/claseTres.css" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="login">
    <div class="content">
        <img src="./Platzi_YardSale_Logos/logo_yard_sale.svg" alt="Yard Sale Logo" class="content__logo">
        
        <form action="/" class="content__form">
            <label for="mail" class="content__label">Email account</label>
            <input type="text" id="mail" placeholder="account@ipn.mx.com" class="content__input">
            <label for="password" class="content__label">Enter password</label>
            <input type="password" id="password" placeholder="********" class="content__input">

            <input type="submit" value="Login" class="content__button content__button--primary">
            <a href="" class="content__a">Forgot my password</a>
        </form>
               
        <input type="submit" value="Sign up" class="content__button content__button--secondary">
    </div>
</div>
    
</body>
</html>
