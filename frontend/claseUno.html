<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/claseUno.css" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <title>Forgot password</title>
</head>
<body>
    <div class="login">
    <div class="content">
        <img src="./Platzi_YardSale_Logos/logo_yard_sale.svg" alt="Yard Sale Logo" class="content__logo">
        <h1 class="content__title">Create a new password</h1>
        <p class="content__subtitle">Enter a new password for your account</p>

        <form action="/" class="content__form">
            <label for="password" class="content__label">Password</label>
            <input type="password" id="password" placeholder="********" class="content__input">

            <label for="re-enter-password" class="content__label">Re-enter password</label>
            <input type="password" id="re-enter-password" placeholder="********" class="content__input">

            <input type="submit" value="Confirm" class="content__button content__button--primary">
        </form>
    </div>
</div>
</body>
</html>
